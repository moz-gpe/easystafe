url: https://moz-gpe.github.io/easystafe/

template:
  bootstrap: 5
  bslib:
    navbar-brand-image-height: 200px
    base_font: {google: "Montserrat"}
    heading_font: {google: "Lato"}
    code_font: {google: "Source Code Pro"}
    primary: "#306cc9"

lang: pt

navbar:
  structure:
    left: [reference, articles]
    right: [github]
  components:
    links:
      - text: "Código-fonte"
        href: https://github.com/moz-gpe/easystafe
      - text: "Reportar erro"
        href: https://github.com/moz-gpe/easystafe/issues

reference:
  - title: "Importação e metadados"
    desc: "Funções para carregar ficheiros e extrair metadados"
    contents:
      - extrair_meta_extracto

  - title: "Processamento"
    desc: "Funções principais de limpeza e processamento"
    contents:
      - processar_extracto_esistafe
      - processar_extracto_razao_c
      - processar_extracto_absa

  - title: "Recodificação"
    desc: "Funções para recodificar e classificar variáveis"
    contents:
      - recodificar_esistafe_vars
      - recode_programa_tipo

  - title: "Exportação"
    desc: "Funções para gravar outputs processados"
    contents:
      - gravar_extracto_sistafe
      - gravar_extracto_razao_c
      - gravar_extracto_absa
