url: https://moz-gpe.github.io/easystafe/

template:
  bootstrap: 5
  bslib:
    navbar-brand-image-height: 200px
    base_font: {google: "Montserrat"}
    heading_font: {google: "Lato"}
    code_font: {google: "Source Code Pro"}
    primary: "#306cc9"

lang: pt

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]
  components:
    news:
      text: "Changelog"
      href: news/index.html
    links:
      - text: "Código-fonte"
        href: https://github.com/moz-gpe/easystafe
      - text: "Reportar erro"
        href: https://github.com/moz-gpe/easystafe/issues

reference:
  - title: "Processamento"
    desc: "Funções principais de limpeza e processamento de ficheiros exportados do e-SISTAFE e extractos bancários"
    contents:
      - processar_extracto_esistafe
      - processar_extracto_razao_c
      - processar_extracto_absa

  - title: "Taxas de Câmbio"
    desc: "Funções para obter e aplicar taxas de câmbio diárias do BancoMOC"
    contents:
      - parse_bancomoc_pdf
      - obter_conversao_bancomoc
      - adicionar_conversao_moeda

  - title: "Dados"
    desc: "Tabelas de referência incluídas no pacote"
    contents:
      - razao_map

  - title: "Enriquecer Dados"
    desc: "Funções para recodificar, classificar e adicionar variáveis aos dados processados"
    contents:
      - extrair_meta_extracto
      - carregar_lookups_esistafe
      - adicionar_lookups_esistafe
      - config_para_duckdb
      - codificar_dimensoes

  - title: "Gravar Dados Processados"
    desc: "Funções para gravar outputs processados"
    contents:
      - gravar_esistafe
      - gravar_extracto_razao_c
      - gravar_extracto_absa
      - gravar_compilacao_sistafe
      - gravar_compilacao_razao_c

  - title: "Verificação"
    desc: "Funções para apoiar as verificações de qualidade"
    contents:
      - verificar_ugb_completude
